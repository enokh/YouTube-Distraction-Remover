<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>YouTube Distraction Remover</title>
  <style>
    body {
      font-family: system-ui, sans-serif;
      width: 240px;
      padding: 14px 16px;
      margin: 0;
      color: #111;
    }
    h2 {
      font-size: 13px;
      font-weight: 600;
      margin: 0 0 12px;
    }
    label {
      display: flex;
      align-items: flex-start;
      gap: 9px;
      padding: 9px 10px;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      margin-bottom: 8px;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
    }
    label.selected {
      border-color: #065fd4;
      background: #e8f0fe;
    }
    label input[type="radio"] {
      margin-top: 2px;
      flex-shrink: 0;
      accent-color: #065fd4;
    }
    .mode-title {
      display: block;
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 2px;
    }
    .mode-desc {
      display: block;
      font-size: 11px;
      color: #555;
      line-height: 1.4;
    }
    #status {
      font-size: 11px;
      color: #1a73e8;
      min-height: 14px;
      margin-top: 4px;
    }
  </style>
</head>
<body>
  <h2>Homepage Mode</h2>

  <label id="label-basic">
    <input type="radio" name="mode" value="basic">
    <span>
      <span class="mode-title">Basic</span>
      <span class="mode-desc">Hides the algorithmic feed and redirects you to your Subscriptions.</span>
    </span>
  </label>

  <label id="label-advanced">
    <input type="radio" name="mode" value="advanced">
    <span>
      <span class="mode-title">Advanced</span>
      <span class="mode-desc">Keeps the feed but filters it to only show videos from your subscribed channels.</span>
    </span>
  </label>

  <p id="status"></p>

  <script src="popup.js"></script>
</body>
</html>
